<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Outreach Agent</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section id="campaign-section">
    <label for="industry-select">Industry</label>
    <select id="industry-select"></select>
    <label>Tags (optional)</label>
    <div id="tags-container"></div>
    <button id="create-campaign-btn" disabled>Create Campaign</button>
    <div id="campaign-result"></div>
  </section>
  <h1>Outreach Agent</h1>
  <p id="app-description">Generate personalized outbound emails in batch using AI. Select leads, run the process, and get ready-to-use outreach messages instantly.</p>

  <div id="selection-counter">Selected: 0 / 20</div>

  <div id="lead-table-container"></div>

  <button id="run-btn" disabled>Run Batch</button>
  <span id="status-msg"></span>

  <div id="results-container"></div>

  <script type="module" src="main.js"></script>
  <script type="module" src="campaigns.js"></script>
</body>
</html>
